<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40" fill="none" role="img" aria-label="IFLEON logo">
  <defs>
    <linearGradient id="ifleon-bg" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2563eb" />
      <stop offset="0.55" stop-color="#14b8a6" />
      <stop offset="1" stop-color="#10b981" />
    </linearGradient>
    <radialGradient id="ifleon-node" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffffff" />
      <stop offset="1" stop-color="#a7f3d0" />
    </radialGradient>
    <filter id="ifleon-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <rect x="1" y="1" width="38" height="38" rx="10" fill="url(#ifleon-bg)" />
  <rect x="1" y="1" width="38" height="38" rx="10" fill="none" stroke="#ffffff" stroke-opacity="0.18" />
  <path d="M14 20 C 14 14, 18 14, 20 20 C 22 26, 26 26, 26 20 C 26 14, 22 14, 20 20 C 18 26, 14 26, 14 20 Z" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#ifleon-glow)" />
  <circle cx="14" cy="20" r="2.4" fill="url(#ifleon-node)" />
  <circle cx="26" cy="20" r="2.4" fill="url(#ifleon-node)" />
  <circle cx="20" cy="20" r="1.5" fill="#ffffff" />
</svg>
